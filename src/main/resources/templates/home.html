<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/bootstrap.min.css}">

    <title>Home</title>
</head>

<body class="p-3 mb-2 bg-light text-black">
<div class="container">

    <!-- Logout -->
    <div id="logoutDiv">
        <form th:action="@{/logout}" method="POST">
            <button type="submit" class="btn btn-secondary float-right">Logout</button>
        </form>
    </div>

    <div id="contentDiv" style="clear: right;">

        <!-- Tabs -->
        <nav style="clear: right;">
            <div class="nav nav-tabs" id="nav-tab" role="tablist">
                <a class="nav-item nav-link active" id="nav-files-tab" data-toggle="tab"
                   href="#nav-files" role="tab" aria-controls="nav-files" aria-selected="true">Files</a>

                <a class="nav-item nav-link" id="nav-notes-tab" data-toggle="tab"
                   href="#nav-notes" role="tab" aria-controls="nav-notes" aria-selected="false">Notes</a>

                <a class="nav-item nav-link" id="nav-credentials-tab" data-toggle="tab"
                   href="#nav-credentials" role="tab" aria-controls="nav-credentials" aria-selected="false">Credentials</a>
            </div>
        </nav>

        <div class="tab-content" id="nav-tabContent">

            <!-- FILES TAB -->
            <div class="tab-pane fade show active" id="nav-files" role="tabpanel" aria-labelledby="nav-files-tab">

                <form th:action="@{/file/upload}" enctype="multipart/form-data" method="POST">
                    <div class="container">
                        <div class="row" style="margin: 1em;">
                            <div class="col-sm-2">
                                <label for="fileUpload">Upload a New File:</label>
                            </div>
                            <div class="col-sm-6">
                                <input type="file" class="form-control-file" id="fileUpload" name="fileUpload">
                            </div>
                            <div class="col-sm-4">
                                <button type="submit" class="btn btn-dark" id="uploadButton">Upload</button>
                            </div>
                        </div>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-striped" id="fileTable">
                        <thead>
                        <tr>
                            <th style="width: 20%" scope="col"></th>
                            <th style="width: 80%" scope="col">File Name</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="file : ${files}">
                            <td>
                                <a th:href="@{/file/view/{id}(id=${file.fileId})}"
                                   target="_blank"
                                   class="btn btn-success">View</a>

                                <a th:href="@{/file/delete/{id}(id=${file.fileId})}"
                                   class="btn btn-danger">Delete</a>
                            </td>

                            <th scope="row" th:text="${file.filename}"></th>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- NOTES TAB -->
            <div class="tab-pane fade" id="nav-notes" role="tabpanel" aria-labelledby="nav-notes-tab">

                <button style="margin: 0.25em;" type="button"
                        class="btn btn-info float-right"
                        onclick="showNoteModal()">
                    + Add a New Note
                </button>

                <div class="table-responsive">
                    <table class="table table-striped" id="userTable">
                        <thead>
                        <tr>
                            <th style="width: 20%" scope="col"></th>
                            <th style="width: 20%" scope="col">Title</th>
                            <th style="width: 60%" scope="col">Description</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="note : ${notes}">
                            <td>
                                <button type="button"
                                        class="btn btn-success"
                                        th:data-noteid="${note.noteid}"
                                        th:data-title="${note.notetitle}"
                                        th:data-description="${note.notedescription}"
                                        onclick="showNoteModal(
                                            this.dataset.noteid,
                                            this.dataset.title,
                                            this.dataset.description
                                        )">
                                    Edit
                                </button>

                                <a th:href="@{/note/delete/{id}(id=${note.noteid})}"
                                   class="btn btn-danger">Delete</a>
                            </td>

                            <th scope="row" th:text="${note.notetitle}"></th>
                            <td th:text="${note.notedescription}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Note Modal -->
                <div class="modal fade" id="noteModal" tabindex="-1" role="dialog">
                    <div class="modal-dialog" role="document">
                        <div class="modal-content">

                            <div class="modal-header">
                                <h5 class="modal-title">Note</h5>
                                <button type="button" class="close" data-dismiss="modal">
                                    <span>&times;</span>
                                </button>
                            </div>

                            <div class="modal-body">
                                <form th:action="@{/note}" method="POST">

                                    <input type="hidden" name="noteid" id="note-id">

                                    <div class="form-group">
                                        <label for="note-title">Title</label>
                                        <input type="text"
                                               name="notetitle"
                                               class="form-control"
                                               id="note-title"
                                               required>
                                    </div>

                                    <div class="form-group">
                                        <label for="note-description">Description</label>
                                        <textarea class="form-control"
                                                  name="notedescription"
                                                  id="note-description"
                                                  rows="5"
                                                  required></textarea>
                                    </div>

                                    <button id="noteSubmit" type="submit" class="d-none"></button>
                                </form>
                            </div>

                            <div class="modal-footer">
                                <button type="button"
                                        class="btn btn-secondary"
                                        data-dismiss="modal">Close</button>

                                <button type="button"
                                        class="btn btn-primary"
                                        onclick="$('#noteSubmit').click();">
                                    Save changes
                                </button>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- CREDENTIALS TAB -->
            <div class="tab-pane fade" id="nav-credentials" role="tabpanel" aria-labelledby="nav-credentials-tab">

                <button style="margin: 0.25em;" type="button"
                        class="btn btn-info float-right"
                        onclick="showCredentialModal()">
                    + Add a New Credential
                </button>

                <div class="table-responsive">
                    <table class="table table-striped" id="credentialTable">
                        <thead>
                        <tr>
                            <th style="width: 20%" scope="col"></th>
                            <th style="width: 35%" scope="col">URL</th>
                            <th style="width: 20%" scope="col">Username</th>
                            <th style="width: 25%" scope="col">Password</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td>
                                <button type="button" class="btn btn-success">Edit</button>
                                <a class="btn btn-danger">Delete</a>
                            </td>
                            <th scope="row">Example Credential URL</th>
                            <td>Example Credential Username</td>
                            <td>Example Credential Password</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>

        </div>
    </div>
</div>

<script th:src="@{/js/jquery-slim.min.js}"></script>
<script th:src="@{/js/popper.min.js}"></script>
<script th:src="@{/js/bootstrap.min.js}"></script>

<script>
    function showNoteModal(noteId, noteTitle, noteDescription) {
        $('#note-id').val(noteId ? noteId : '');
        $('#note-title').val(noteTitle ? noteTitle : '');
        $('#note-description').val(noteDescription ? noteDescription : '');
        $('#noteModal').modal('show');
    }
</script>

</body>
</html>

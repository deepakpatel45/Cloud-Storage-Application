<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/bootstrap.min.css}">

    <title>Login</title>
</head>

<body class="p-3 mb-2 bg-light text-black">

<div class="container justify-content-center w-50 p-3"
     style="background-color: #eeeeee; margin-top: 5em;">

    <h1 class="display-5">Login</h1>

    <!-- Login Error -->
    <div class="alert alert-danger" th:if="${param.error}">
        Invalid username or password
    </div>

    <!-- Logout Success -->
    <div class="alert alert-success" th:if="${param.logout}">
        You have been logged out
    </div>

    <!-- Signup Success -->
    <div class="alert alert-success" th:if="${signupSuccess}">
        You successfully signed up! Please login.
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label for="inputUsername">Username</label>
            <input type="text"
                   name="username"
                   class="form-control"
                   id="inputUsername"
                   placeholder="Enter Username"
                   maxlength="20"
                   required>
        </div>

        <div class="form-group">
            <label for="inputPassword">Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   id="inputPassword"
                   placeholder="Enter Password"
                   maxlength="20"
                   required>
        </div>

        <button class="btn btn-primary" type="submit" id="login-button">
            Login
        </button>

    </form>

    <br>

    <a th:href="@{/signup}">Click here to sign up</a>

</div>

<script th:src="@{/js/jquery-slim.min.js}"></script>
<script th:src="@{/js/popper.min.js}"></script>
<script th:src="@{/js/bootstrap.min.js}"></script>

</body>
</html>
